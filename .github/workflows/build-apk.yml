name: Build VARC APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  APK_PATH: app/build/outputs/apk/debug/app-debug.apk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK (debug)
        id: build
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        continue-on-error: true

      - name: Report build errors to summary
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "## Build Output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          # Extract Kotlin compilation errors as annotations
          grep -n "error:" build.log 2>/dev/null | head -30 | while IFS=: read -r line msg; do
            echo "::error file=build.log,line=$line::$(echo "$msg" | head -c 200)"
          done
          grep -n "e:" build.log 2>/dev/null | head -30 | while IFS=: read -r line msg; do
            echo "::error file=build.log,line=$line::$(echo "$msg" | head -c 200)"
          done

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Check build status
        if: always()
        run: |
          if [ -f build.log ] && grep -q "BUILD FAILED" build.log; then
            echo "BUILD FAILED - see errors above and build-log artifact"
            exit 1
          fi
          if [ -f build.log ] && grep -q "BUILD SUCCESSFUL" build.log; then
            echo "Build succeeded!"
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VARC-debug
          path: ${{ env.APK_PATH }}
          if-no-files-found: warn
          retention-days: 30
